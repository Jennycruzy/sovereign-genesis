services:
  webhook:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env

  agent:
    build: .
    restart: unless-stopped
    command: node agent/index.js
    env_file:
      - .env

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_ETHERLINK_RPC=https://node.shadownet.etherlink.com
      - NEXT_PUBLIC_CONTRACT_ADDRESS=0xF53e7cD080211b4c38369f2e5f1A0b9401B5470C
      - NEXT_PUBLIC_POLL_INTERVAL_MS=5000
